openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Cost Analysis Per Container API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: containers
    description: Container records
  - name: charges
    description: Container charges

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /containers:
    get:
      operationId: listContainers
      tags: [containers]
      summary: List all containers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of containers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerListResponse"
    post:
      operationId: createContainer
      tags: [containers]
      summary: Create a single container record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContainerRequest"
      responses:
        "201":
          description: Container created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Container"

  /containers/upload:
    post:
      operationId: uploadContainers
      tags: [containers]
      summary: Upload containers from CSV/Excel data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadContainersRequest"
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadContainersResponse"

  /containers/{id}:
    get:
      operationId: getContainer
      tags: [containers]
      summary: Get a container by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Container details with charges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerDetail"
    put:
      operationId: updateContainer
      tags: [containers]
      summary: Update container basic info
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContainerRequest"
      responses:
        "200":
          description: Updated container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Container"
    patch:
      operationId: patchContainer
      tags: [containers]
      summary: Partially update a container (e.g. deliveredAt); bypasses lock for delivery date field
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContainerRequest"
      responses:
        "200":
          description: Updated container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Container"

  /containers/{id}/lock:
    post:
      operationId: lockContainer
      tags: [containers]
      summary: Lock or unlock a container record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockContainerRequest"
      responses:
        "200":
          description: Lock status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Container"

  /containers/{id}/charges:
    get:
      operationId: getContainerCharges
      tags: [charges]
      summary: Get all charges for a container
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Charges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerCharges"
    put:
      operationId: updateContainerCharges
      tags: [charges]
      summary: Update charges for a container section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContainerChargesRequest"
      responses:
        "200":
          description: Updated charges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerCharges"

  /containers/{id}/audit:
    get:
      operationId: getContainerAuditLog
      tags: [containers]
      summary: Get audit log for a container
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /containers/{id}/sections/{section}/submit:
    post:
      operationId: submitSection
      tags: [containers]
      summary: Staff submits a section for review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: section
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionApproval"

  /containers/{id}/sections/{section}/approve:
    post:
      operationId: approveSection
      tags: [containers]
      summary: Admin approves a submitted section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: section
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionApproval"

  /containers/{id}/sections/{section}/reject:
    post:
      operationId: rejectSection
      tags: [containers]
      summary: Admin rejects a submitted section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: section
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectSectionRequest"
      responses:
        "200":
          description: Section rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionApproval"

  /containers/{id}/sections/{section}/lock:
    post:
      operationId: lockSection
      tags: [containers]
      summary: Admin locks a specific section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: section
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /containers/{id}/sections/{section}/unlock:
    post:
      operationId: unlockSection
      tags: [containers]
      summary: Admin unlocks a specific section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: section
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /approvals:
    get:
      operationId: getApprovalQueue
      tags: [containers]
      summary: Get admin approval queue (submitted sections)
      responses:
        "200":
          description: Approval queue items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalQueueItem"

  /my-tasks:
    get:
      operationId: getMyTasks
      tags: [containers]
      summary: Get staff task list
      responses:
        "200":
          description: Staff task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyTasksResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [containers]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics:
    get:
      summary: Get analytics data
      operationId: getAnalytics
      tags: [Analytics]
      security: [{cookieAuth: []}]
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

  /analytics/deliveries:
    get:
      summary: Get delivery tracking report data
      operationId: getDeliveryAnalytics
      tags: [Analytics]
      security: [{cookieAuth: []}]
      parameters:
        - in: query
          name: from
          required: false
          schema: {type: string, format: date}
          description: Filter deliveries from this date (inclusive)
        - in: query
          name: to
          required: false
          schema: {type: string, format: date}
          description: Filter deliveries up to this date (inclusive)
      responses:
        "200":
          description: Delivery report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryReportResponse"

  /reports/containers:
    get:
      summary: Get container report data
      operationId: getContainerReport
      tags: [Reports]
      security: [{cookieAuth: []}]
      parameters:
        - in: query
          name: status
          schema: {type: string}
        - in: query
          name: from
          schema: {type: string, format: date}
        - in: query
          name: to
          schema: {type: string, format: date}
      responses:
        "200":
          description: Report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerReportResponse"

  /reports/export:
    get:
      summary: Export containers as CSV
      operationId: exportContainersCSV
      tags: [Reports]
      security: [{cookieAuth: []}]
      parameters:
        - in: query
          name: status
          schema: {type: string}
        - in: query
          name: from
          schema: {type: string, format: date}
        - in: query
          name: to
          schema: {type: string, format: date}
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /containers/{id}/timeline:
    get:
      summary: Get container timeline
      operationId: getContainerTimeline
      tags: [Timeline]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"
    post:
      summary: Add timeline event
      operationId: addTimelineEvent
      tags: [Timeline]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimelineEventRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineEvent"

  /containers/{id}/timeline/{eventId}:
    delete:
      summary: Delete timeline event
      operationId: deleteTimelineEvent
      tags: [Timeline]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: eventId
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Deleted

  /containers/{id}/tasks:
    get:
      summary: Get container tasks
      operationId: getContainerTasks
      tags: [Tasks]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerTask"
    post:
      summary: Create task
      operationId: createContainerTask
      tags: [Tasks]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerTask"

  /containers/{id}/tasks/{taskId}:
    patch:
      summary: Update task
      operationId: updateContainerTask
      tags: [Tasks]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: taskId
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerTask"
    delete:
      summary: Delete task
      operationId: deleteContainerTask
      tags: [Tasks]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: taskId
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Deleted

  /containers/{id}/documents:
    get:
      summary: Get container documents
      operationId: getContainerDocuments
      tags: [Documents]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerDocument"

  /containers/{id}/documents/{docId}:
    delete:
      summary: Delete document
      operationId: deleteContainerDocument
      tags: [Documents]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: docId
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Deleted

  /containers/{containerId}/custom-values:
    get:
      summary: Get custom field values for container
      operationId: getCustomFieldValues
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: containerId
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Field values
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldValue"
    post:
      summary: Save custom field values
      operationId: saveCustomFieldValues
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: containerId
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCustomFieldValuesRequest"
      responses:
        "200":
          description: Saved

  /custom-sections:
    get:
      summary: List custom sections with fields
      operationId: getCustomSections
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: query
          name: containerId
          required: false
          schema: {type: integer}
          description: Filter sections by container ID
      responses:
        "200":
          description: Sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomSectionWithFields"
    post:
      summary: Create custom section
      operationId: createCustomSection
      tags: [Sections]
      security: [{cookieAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomSectionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomSectionWithFields"

  /custom-sections/{id}:
    patch:
      summary: Update custom section
      operationId: updateCustomSection
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomSectionRequest"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete custom section
      operationId: deleteCustomSection
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Deleted

  /custom-sections/{id}/fields:
    post:
      summary: Add field to section
      operationId: addCustomField
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomFieldRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomField"

  /custom-sections/{id}/fields/{fieldId}:
    patch:
      summary: Update custom field
      operationId: updateCustomField
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: fieldId
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomFieldRequest"
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete custom field
      operationId: deleteCustomField
      tags: [Sections]
      security: [{cookieAuth: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: fieldId
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Deleted

  /intelligence/alerts:
    get:
      summary: Get profit intelligence and delay alerts
      operationId: getIntelligenceAlerts
      tags: [Intelligence]
      security: [{cookieAuth: []}]
      responses:
        "200":
          description: Alerts and insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, staff]
        sectionPermission:
          type: string
          nullable: true
        sectionPermissions:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, email, name, role, isActive, createdAt]

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, staff]
        sectionPermission:
          type: string
          nullable: true
        sectionPermissions:
          type: string
          nullable: true
      required: [email, name, password, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, staff]
        sectionPermission:
          type: string
          nullable: true
        sectionPermissions:
          type: string
          nullable: true
        isActive:
          type: boolean
        password:
          type: string
        status:
          type: string

    Container:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        containerNumber:
          type: string
        blNumber:
          type: string
        declaration:
          type: string
        size:
          type: string
        vessel:
          type: string
        status:
          type: string
